version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: nutrir_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: c11560011
      POSTGRES_DB: nutrir
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nutrir_backend
    restart: always
    environment:
      - PORT=5000
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:c11560011@db:5432/nutrir
      - JWT_SECRET=super_secret_jwt_key_nutrir_2026_change_me
      - GOOGLE_CLIENT_ID=your_google_oauth_client_id.apps.googleusercontent.com
      - MERCADO_PAGO_ACCESS_TOKEN=APP_USR-your_mercado_pago_token_here
      - ASAAS_API_KEY=your_asaas_api_key_here
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nutrir_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
      - /var/www/certbot:/var/www/certbot
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
